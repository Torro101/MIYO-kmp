version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      android-runtime:
        patterns:
          - "androidx.*"
          - "com.google.android.*"
          - "com.android.*"
      kotlin-toolchain:
        patterns:
          - "org.jetbrains.kotlin*"
          - "com.google.devtools.ksp"
      network-and-parsers:
        patterns:
          - "com.squareup.*"
          - "org.jsoup:*"
          - "com.github.YakaTeam:*"
    ignore:
      # gradle/libs.versions.toml documents crashes on Android 5/A5-class
      # devices with Coil 3.4.0. Keep the pin until that path is validated.
      - dependency-name: "io.coil-kt.coil3:coil-core"
        versions: [ "3.4.0" ]
      - dependency-name: "io.coil-kt.coil3:coil-gif"
        versions: [ "3.4.0" ]
      - dependency-name: "io.coil-kt.coil3:coil-network-okhttp"
        versions: [ "3.4.0" ]
      - dependency-name: "io.coil-kt.coil3:coil-svg"
        versions: [ "3.4.0" ]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
