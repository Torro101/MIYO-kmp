version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      android-runtime:
        patterns:
          - "androidx.*"
          - "com.google.android.*"
          - "com.android.*"
      kotlin-toolchain:
        patterns:
          - "org.jetbrains.kotlin*"
          - "com.google.devtools.ksp"
      network-and-parsers:
        patterns:
          - "com.squareup.*"
          - "org.jsoup:*"
          - "com.github.YakaTeam:*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
