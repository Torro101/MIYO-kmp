<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" role="img" aria-label="Miyo slime mascot mark">
  <style>
    @media (prefers-reduced-motion: no-preference) {
      #slime { transform-origin: 54px 64px; animation: pop .58s cubic-bezier(.18,1.35,.3,1) both; }
      #bubbles { transform-origin: 54px 54px; animation: bubble .58s cubic-bezier(.18,1.1,.28,1) both; }
      @keyframes pop { 0% { transform: scale(.72) translateY(8px); opacity: .72; } 70% { transform: scale(1.04) translateY(-1px); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
      @keyframes bubble { 0% { transform: translateY(10px); opacity: 0; } 70% { opacity: 1; } 100% { transform: translateY(-5px); opacity: .92; } }
    }
  </style>
  <rect width="108" height="108" rx="24" fill="#081217"/>
  <g id="slime" transform="scale(4.5)">
    <path fill="#18AFCF" fill-opacity=".24" d="M12 3.3c4.9 0 8.8 3.9 8.8 9.4 0 5.1-3.7 8.5-8.8 8.5s-8.8-3.4-8.8-8.5c0-5.5 3.9-9.4 8.8-9.4Z"/>
    <path fill="#65DFF7" d="M12 4.2c4.2 0 7.5 3.6 7.5 8.5 0 4.4-3.1 7.1-7.5 7.1s-7.5-2.7-7.5-7.1c0-4.9 3.3-8.5 7.5-8.5Z"/>
    <path fill="#DDFBFF" fill-opacity=".58" d="M7.1 9.4c1.1-2.6 3.4-3.7 5.5-3.8-1.8 1.4-2.8 3.2-3.4 5.4-.4 1.4-2.7.2-2.1-1.6Z"/>
    <path fill="#DDFBFF" fill-opacity=".28" d="M5.2 14.9c1.6 1.9 3.9 2.8 6.8 2.8s5.2-.9 6.8-2.8c-.8 3.1-3.4 4.9-6.8 4.9s-6-1.8-6.8-4.9Z"/>
    <path fill="#102A33" d="M8.5 10.7c.7 0 1.2.7 1.2 1.6s-.5 1.6-1.2 1.6-1.2-.7-1.2-1.6.5-1.6 1.2-1.6Zm7 0c.7 0 1.2.7 1.2 1.6s-.5 1.6-1.2 1.6-1.2-.7-1.2-1.6.5-1.6 1.2-1.6Z"/>
    <path fill="none" stroke="#102A33" stroke-linecap="round" stroke-width=".55" d="M10.1 15.1c.5.6 1.1.9 1.9.9s1.4-.3 1.9-.9"/>
  </g>
  <g id="bubbles" transform="scale(4.5)">
    <circle cx="5.1" cy="6.9" r="1.3" fill="#A6F4FF" fill-opacity=".62"/>
    <circle cx="18.9" cy="7" r="1.1" fill="#A6F4FF" fill-opacity=".5"/>
    <circle cx="12" cy="2.9" r="1.1" fill="#A6F4FF" fill-opacity=".42"/>
  </g>
</svg>
