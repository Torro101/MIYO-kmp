name: KMP CI

on:
  push:
    branches: [ main, feature/kmp-migration ]
  pull_request:
    branches: [ main, feature/kmp-migration ]
  workflow_dispatch:

concurrency:
  group: kmp-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dkotlin.compiler.execution.strategy=in-process

jobs:
  verify-structure:
    name: Verify KMP structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Source sets and hygiene
        run: |
          set -euo pipefail
          test -d shared/src/commonMain/kotlin
          test -d shared/src/androidMain/kotlin
          test -d shared/src/iosMain/kotlin
          test -f shared/build.gradle.kts
          test -f settings.gradle.kts
          test -f iosApp/Miyo/ContentView.swift
          test -f shared/src/commonMain/kotlin/org/koharu/miyo/MiyoRuntime.kt
          test -f shared/src/commonMain/kotlin/org/koharu/miyo/MiyoShared.kt
          test -f shared/src/iosMain/kotlin/org/koharu/miyo/MiyoIosBootstrap.kt
          test -f tools/miyo_kmpify.py
          test -f docs/KMPIFY_ADAPTATION.md

          COMMON=$(find shared/src/commonMain/kotlin -name '*.kt' | wc -l)
          ANDROID=$(find shared/src/androidMain/kotlin -name '*.kt' | wc -l)
          IOS=$(find shared/src/iosMain/kotlin -name '*.kt' | wc -l)
          echo "counts common=$COMMON android=$ANDROID ios=$IOS"
          test "$COMMON" -ge 120
          test "$ANDROID" -ge 500
          test "$IOS" -ge 12

          if grep -RInE '^import (android\.|androidx\.|okhttp3\.|org\.jsoup\.|javax\.inject|dagger\.)' shared/src/commonMain/kotlin --include='*.kt'; then
            echo "FAIL: platform imports in commonMain"; exit 1
          fi
          if grep -RInE '^import java\.|^import javax\.' shared/src/commonMain/kotlin --include='*.kt'; then
            echo "FAIL: JVM imports in commonMain"; exit 1
          fi
          if grep -RInE 'String\.format|System\.currentTimeMillis|\.javaClass\b' shared/src/commonMain/kotlin --include='*.kt'; then
            echo "FAIL: JVM-only APIs in commonMain"; exit 1
          fi

          for f in Clipboard DateTime DateUtils FileSystem HttpClient ImageLoader Logger Network Notification Platform Preferences Share; do
            test -f "shared/src/commonMain/kotlin/org/koharu/miyo/core/di/expect/${f}.kt"
            test -f "shared/src/androidMain/kotlin/org/koharu/miyo/core/di/expect/${f}.kt"
            test -f "shared/src/iosMain/kotlin/org/koharu/miyo/core/di/expect/${f}.kt"
          done
          test -f shared/src/commonMain/kotlin/org/koharu/miyo/core/nativeio/PlatformNative.kt
          test -f shared/src/androidMain/kotlin/org/koharu/miyo/core/nativeio/PlatformNative.android.kt
          test -f shared/src/iosMain/kotlin/org/koharu/miyo/core/nativeio/PlatformNative.ios.kt

          python3 tools/miyo_kmpify.py expect-check
          echo "structure OK"

  compile-common:
    name: Compile shared (common metadata)
    runs-on: ubuntu-latest
    needs: [ verify-structure ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: compileKotlinMetadata
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :shared:compileKotlinMetadata --stacktrace

  compile-shared-ios:
    name: Compile shared (iOS framework)
    runs-on: macos-14
    needs: [ verify-structure ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Link iOS Simulator arm64 framework
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :shared:linkDebugFrameworkIosSimulatorArm64 --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: shared-ios-simulator-framework
          path: shared/build/bin/iosSimulatorArm64/debugFramework/**
          if-no-files-found: error

  # SOFT GATE — see docs/KMPIFY_ADAPTATION.md and docs/KMP_CI.md
  # Flip continue-on-error to false and add to kmp-required when
  # :shared:compileDebugKotlinAndroid is reliably green on main.
  compile-shared-android:
    name: Compile shared (Android — soft)
    runs-on: ubuntu-latest
    needs: [ verify-structure ]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: yes | sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1" || true
      - uses: gradle/actions/setup-gradle@v4
      - name: compileDebugKotlinAndroid
        id: android_kt
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :shared:compileDebugKotlinAndroid --stacktrace
      - name: assembleDebug AAR
        if: steps.android_kt.outcome == 'success'
        run: ./gradlew --no-daemon :shared:assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: shared-debug-aar
          path: shared/build/outputs/aar/*.aar
          if-no-files-found: warn

  compile-app-android:
    name: Compile Android app (soft)
    runs-on: ubuntu-latest
    needs: [ compile-common ]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: yes | sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1" || true
      - uses: gradle/actions/setup-gradle@v4
      - name: assembleDebug
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:assembleDebug --stacktrace

  # Required green gate for the iOS + common KMP port
  kmp-required:
    name: KMP required gates
    runs-on: ubuntu-latest
    needs: [ verify-structure, compile-common, compile-shared-ios ]
    steps:
      - run: |
          echo "HARD gates green: structure + common metadata + iOS framework"
          echo "SOFT (non-blocking): shared Android compile, app assemble — see docs/KMP_CI.md"
