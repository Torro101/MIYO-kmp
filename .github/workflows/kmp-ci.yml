name: KMP CI

on:
  push:
    branches: [ main, feature/kmp-migration ]
  pull_request:
    branches: [ main, feature/kmp-migration ]
  workflow_dispatch:

concurrency:
  group: kmp-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dkotlin.compiler.execution.strategy=in-process

jobs:
  verify-structure:
    name: Verify KMP structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Source sets and hygiene
        run: |
          set -euo pipefail
          test -d shared/src/commonMain/kotlin
          test -d shared/src/androidMain/kotlin
          test -d shared/src/iosMain/kotlin
          test -f shared/build.gradle.kts
          test -f settings.gradle.kts
          test -f iosApp/Miyo/ContentView.swift
          test -f shared/src/commonMain/kotlin/org/koharu/miyo/MiyoRuntime.kt
          test -f shared/src/iosMain/kotlin/org/koharu/miyo/MiyoIosBootstrap.kt

          COMMON=$(find shared/src/commonMain/kotlin -name '*.kt' | wc -l)
          ANDROID=$(find shared/src/androidMain/kotlin -name '*.kt' | wc -l)
          IOS=$(find shared/src/iosMain/kotlin -name '*.kt' | wc -l)
          echo "counts common=$COMMON android=$ANDROID ios=$IOS"
          test "$COMMON" -ge 80
          test "$ANDROID" -ge 500
          test "$IOS" -ge 12

          echo "=== Android imports in commonMain (must be empty) ==="
          if grep -RInE '^import (android\.|androidx\.|okhttp3\.|org\.jsoup\.|javax\.inject|dagger\.)' shared/src/commonMain/kotlin --include='*.kt'; then
            echo "FAIL: platform imports in commonMain"
            exit 1
          fi

          echo "=== java.* imports in commonMain (must be empty for K/N) ==="
          if grep -RInE '^import java\.|^import javax\.' shared/src/commonMain/kotlin --include='*.kt'; then
            echo "FAIL: JVM imports in commonMain"
            exit 1
          fi

          echo "=== expect/actual trio check ==="
          for f in Clipboard DateTime DateUtils FileSystem HttpClient ImageLoader Logger Network Notification Platform Preferences Share; do
            test -f "shared/src/commonMain/kotlin/org/koharu/miyo/core/di/expect/${f}.kt"
            test -f "shared/src/androidMain/kotlin/org/koharu/miyo/core/di/expect/${f}.kt"
            test -f "shared/src/iosMain/kotlin/org/koharu/miyo/core/di/expect/${f}.kt"
          done
          test -f shared/src/commonMain/kotlin/org/koharu/miyo/core/nativeio/PlatformNative.kt
          test -f shared/src/androidMain/kotlin/org/koharu/miyo/core/nativeio/PlatformNative.android.kt
          test -f shared/src/iosMain/kotlin/org/koharu/miyo/core/nativeio/PlatformNative.ios.kt
          echo "structure OK"

  compile-shared-android:
    name: Compile shared (Android)
    runs-on: ubuntu-latest
    needs: [ verify-structure ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1" || true
          sdkmanager --list_installed | head -40

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile common metadata + Android debug Kotlin
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon \
            -Pandroid.builder.sdkDownload=true \
            :shared:compileKotlinMetadata \
            :shared:compileDebugKotlinAndroid \
            --stacktrace

      - name: Assemble shared debug AAR
        run: ./gradlew --no-daemon :shared:assembleDebug --stacktrace

      - name: Upload shared AAR
        uses: actions/upload-artifact@v4
        with:
          name: shared-debug-aar
          path: shared/build/outputs/aar/*.aar
          if-no-files-found: error

  compile-shared-ios:
    name: Compile shared (iOS framework)
    runs-on: macos-14
    needs: [ verify-structure ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Link iOS Simulator arm64 framework
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon \
            :shared:linkDebugFrameworkIosSimulatorArm64 \
            --stacktrace

      - name: Upload iOS framework
        uses: actions/upload-artifact@v4
        with:
          name: shared-ios-simulator-framework
          path: |
            shared/build/bin/iosSimulatorArm64/debugFramework/**
          if-no-files-found: error

  compile-app-android:
    name: Compile Android app (debug)
    runs-on: ubuntu-latest
    needs: [ compile-shared-android ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1" || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile app debug Kotlin
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:compileDebugKotlin --stacktrace

      - name: Assemble debug APK
        run: ./gradlew --no-daemon :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
