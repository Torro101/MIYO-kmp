name: CI/CD Pipeline

on:
  push:
    branches: [ main, devel, 'feature/**' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, devel ]
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish the signed release APK to GitHub Releases'
        required: false
        default: false
        type: boolean
      release_tag:
        description: 'Release tag to create/use when publishing manually, for example v0.0.4'
        required: false
        type: string

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lint --stacktrace
        continue-on-error: true

      - name: Upload Lint Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lint-results
          path: |
            app/build/reports/lint-results*
            app/build/intermediates/lint_intermediate_text_report/**/lint-results*.txt

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace
        continue-on-error: true

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: |
            app/build/reports/tests/
            app/build/test-results/

  build:
    runs-on: ubuntu-latest
    needs: [ lint, unit-test ]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Load MIYO build variables
        env:
          MIYO_VARIABLES: ${{ vars.MIYO }}
          APP_APPLICATION_ID: ${{ vars.APP_APPLICATION_ID }}
          APP_DISPLAY_NAME: ${{ vars.APP_DISPLAY_NAME }}
          APP_UPDATES_REPO: ${{ vars.APP_UPDATES_REPO }}
          APP_SOURCE_URL: ${{ vars.APP_SOURCE_URL }}
          APP_ICON_URL: ${{ vars.APP_ICON_URL }}
        run: |
          set -euo pipefail

          write_build_env() {
            case "$1" in
              APP_APPLICATION_ID|APP_DISPLAY_NAME|APP_UPDATES_REPO|APP_SOURCE_URL|APP_ICON_URL)
                if [ -n "$2" ]; then
                  printf '%s=%s\n' "$1" "$2" >> "${GITHUB_ENV}"
                fi
                ;;
            esac
          }

          if [ -n "${MIYO_VARIABLES:-}" ]; then
            while IFS='=' read -r key value || [ -n "${key:-}" ]; do
              key="${key%$'\r'}"
              value="${value%$'\r'}"
              case "$key" in
                ''|\#*) continue ;;
              esac
              write_build_env "$key" "$value"
            done <<< "${MIYO_VARIABLES}"
          fi

          write_build_env APP_APPLICATION_ID "${APP_APPLICATION_ID:-}"
          write_build_env APP_DISPLAY_NAME "${APP_DISPLAY_NAME:-}"
          write_build_env APP_UPDATES_REPO "${APP_UPDATES_REPO:-}"
          write_build_env APP_SOURCE_URL "${APP_SOURCE_URL:-}"
          write_build_env APP_ICON_URL "${APP_ICON_URL:-}"

      - name: Build Debug APK
        run: |
          set -euo pipefail
          APP_APPLICATION_ID="${APP_APPLICATION_ID:-org.koharu.miyo}"
          APP_DISPLAY_NAME="${APP_DISPLAY_NAME:-Miyo}"
          APP_UPDATES_REPO="${APP_UPDATES_REPO:-Torro101/MIYO}"
          APP_SOURCE_URL="${APP_SOURCE_URL:-https://github.com/${APP_UPDATES_REPO}}"
          APP_ICON_URL="${APP_ICON_URL:-https://raw.githubusercontent.com/${APP_UPDATES_REPO}/refs/heads/main/.github/assets/icon.png}"
          ./gradlew assembleDebug --stacktrace \
            -Papp.applicationId="${APP_APPLICATION_ID}" \
            -Papp.displayName="${APP_DISPLAY_NAME}" \
            -Papp.updatesRepo="${APP_UPDATES_REPO}" \
            -Papp.sourceUrl="${APP_SOURCE_URL}" \
            -Papp.iconUrl="${APP_ICON_URL}"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Decode Release Keystore
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          : "${ANDROID_RELEASE_KEYSTORE_BASE64:?ANDROID_RELEASE_KEYSTORE_BASE64 secret is missing}"
          mkdir -p "${RUNNER_TEMP}/keystore"
          printf '%s' "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/keystore/miyo-release.p12"

      - name: Build Release APK
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        env:
          APP_RELEASE_CERT_SHA256: ${{ secrets.APP_RELEASE_CERT_SHA256 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          : "${APP_RELEASE_CERT_SHA256:?APP_RELEASE_CERT_SHA256 secret is missing}"
          : "${ANDROID_RELEASE_KEYSTORE_PASSWORD:?ANDROID_RELEASE_KEYSTORE_PASSWORD secret is missing}"
          : "${ANDROID_RELEASE_KEY_ALIAS:?ANDROID_RELEASE_KEY_ALIAS secret is missing}"
          : "${ANDROID_RELEASE_KEY_PASSWORD:?ANDROID_RELEASE_KEY_PASSWORD secret is missing}"
          APP_APPLICATION_ID="${APP_APPLICATION_ID:-org.koharu.miyo}"
          APP_DISPLAY_NAME="${APP_DISPLAY_NAME:-Miyo}"
          APP_UPDATES_REPO="${APP_UPDATES_REPO:-Torro101/MIYO}"
          APP_SOURCE_URL="${APP_SOURCE_URL:-https://github.com/${APP_UPDATES_REPO}}"
          APP_ICON_URL="${APP_ICON_URL:-https://raw.githubusercontent.com/${APP_UPDATES_REPO}/refs/heads/main/.github/assets/icon.png}"
          ./gradlew assembleRelease --stacktrace \
            -Papp.applicationId="${APP_APPLICATION_ID}" \
            -Papp.displayName="${APP_DISPLAY_NAME}" \
            -Papp.updatesRepo="${APP_UPDATES_REPO}" \
            -Papp.sourceUrl="${APP_SOURCE_URL}" \
            -Papp.iconUrl="${APP_ICON_URL}" \
            -Papp.releaseCertSha256="${APP_RELEASE_CERT_SHA256}" \
            -Prelease.storeFile="${RUNNER_TEMP}/keystore/miyo-release.p12" \
            -Prelease.storePassword="${ANDROID_RELEASE_KEYSTORE_PASSWORD}" \
            -Prelease.keyAlias="${ANDROID_RELEASE_KEY_ALIAS}" \
            -Prelease.keyPassword="${ANDROID_RELEASE_KEY_PASSWORD}"

      - name: Prepare Release APK
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          version_name="$(sed -n "s/^[[:space:]]*versionName[[:space:]]*=[[:space:]]*'\\([^']*\\)'.*/\\1/p" app/build.gradle | head -n 1)"
          if [ -z "${version_name}" ]; then
            echo "Cannot determine versionName from app/build.gradle" >&2
            exit 1
          fi
          printf 'MIYO_VERSION_NAME=%s\n' "${version_name}" >> "${GITHUB_ENV}"
          mkdir -p release
          shopt -s nullglob
          release_apks=(app/build/outputs/apk/release/*.apk)
          if [ "${#release_apks[@]}" -ne 1 ]; then
            echo "Expected exactly one release APK, found ${#release_apks[@]}" >&2
            printf '%s\n' "${release_apks[@]}" >&2
            exit 1
          fi
          cp "${release_apks[0]}" "release/Miyo-v${version_name}-release.apk"

      - name: Verify Bundled Refinement Models
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          expected_models=(realesrgan-x4plus ultrasharp-x4 realesrgan-x4plus-anime-6b remacri-x4)
          for apk in release/*-release.apk; do
            model_entries="$(unzip -Z1 "${apk}" | grep '^assets/models/' | sed '/^$/d' | sort || true)"
            model_count="$(printf '%s\n' "${model_entries}" | sed '/^$/d' | wc -l | tr -d ' ')"
            if [ "${model_count}" != "4" ]; then
              echo "Expected 4 bundled refinement models in ${apk}, found ${model_count}:" >&2
              printf '%s\n' "${model_entries}" >&2
              exit 1
            fi
            for model in "${expected_models[@]}"; do
              entry="assets/models/${model}.json"
              if ! printf '%s\n' "${model_entries}" | grep -qx "${entry}"; then
                echo "Missing bundled model ${entry} in ${apk}" >&2
                exit 1
              fi
              unzip -p "${apk}" "${entry}" | grep -q "\"id\"[[:space:]]*:[[:space:]]*\"${model}\"" || {
                echo "Bundled model ${entry} in ${apk} has the wrong id" >&2
                exit 1
              }
            done
          done

      - name: Prepare Downloadable Refinement Models
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          model_dir="${RUNNER_TEMP}/miyo-refinement-models"
          mkdir -p "${model_dir}"
          cp .github/model-assets/refinement/*.json "${model_dir}/"
          expected_models=(realesrgan-x4plus ultrasharp-x4 realesrgan-x4plus-anime-6b remacri-x4)
          for model in "${expected_models[@]}"; do
            file="${model_dir}/${model}.json"
            if [ ! -s "${file}" ]; then
              echo "Missing refinement model ${model}" >&2
              exit 1
            fi
            grep -q "\"id\"[[:space:]]*:[[:space:]]*\"${model}\"" "${file}" || {
              echo "Refinement model ${file} has the wrong id" >&2
              exit 1
            }
          done
          model_count="$(find "${model_dir}" -maxdepth 1 -name '*.json' | wc -l | tr -d ' ')"
          if [ "${model_count}" != "4" ]; then
            echo "Expected exactly 4 downloadable model profiles, found ${model_count}" >&2
            find "${model_dir}" -maxdepth 1 -name '*.json' -print >&2
            exit 1
          fi
          (cd "${model_dir}" && zip -q -r "${GITHUB_WORKSPACE}/release/miyo-refinement-models-v${MIYO_VERSION_NAME}.zip" .)

      - name: Generate Release Checksums
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          cd release
          sha256sum *-release.apk miyo-refinement-models-*.zip > "Miyo-v${MIYO_VERSION_NAME}-checksums.sha256"
          cat "Miyo-v${MIYO_VERSION_NAME}-checksums.sha256"

      - name: Upload Release APK
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: miyo-release-apk-with-refinement-models
          path: release/*-release.apk
          if-no-files-found: error

      - name: Upload Downloadable Refinement Models
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: miyo-downloadable-refinement-models
          path: release/miyo-refinement-models-*.zip
          if-no-files-found: error

      - name: Upload Release Checksums
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: miyo-release-checksums
          path: release/*.sha256
          if-no-files-found: error

      - name: Validate Release Tag
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TAG}" ]; then
            echo "release_tag is required when publish_release is enabled" >&2
            exit 1
          fi
          expected_tag="v${MIYO_VERSION_NAME}"
          if [ "${RELEASE_TAG}" != "${expected_tag}" ]; then
            echo "release_tag must match APK versionName: expected ${expected_tag}, got ${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: Publish GitHub Release APK
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: |
            release/*-release.apk
            release/miyo-refinement-models-*.zip
            release/*.sha256

  native-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Build Native Libraries
        run: |
          set -euo pipefail
          if [ ! -f "app/src/main/cpp/CMakeLists.txt" ]; then
            echo "No native CMake project found"
            exit 0
          fi
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            build_dir="app/build/native-ci/${abi}"
            cmake \
              -S app/src/main/cpp \
              -B "${build_dir}" \
              -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI="${abi}" \
              -DANDROID_PLATFORM=android-21 \
              -DCMAKE_BUILD_TYPE=Release
            cmake --build "${build_dir}" --verbose
          done
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

  security-scan:
    runs-on: ubuntu-latest
    # Dependency-Check relies on external vulnerability indexes that may rate
    # limit or return 403. Upload the report when available without blocking CI.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Run Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Miyo'
          path: '.'
          format: 'HTML'

      - name: Upload Security Report
        uses: actions/upload-artifact@v7
        with:
          name: security-report
          path: reports/
