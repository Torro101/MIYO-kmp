name: Android Instrumented Tests

on:
  push:
    branches: [ main, devel ]
  pull_request:
    branches: [ main, devel ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-instrumented-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  connected-debug-android-test:
    name: connectedDebugAndroidTest API ${{ matrix.api-level }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Keep this as an advisory signal until the existing Room schema assets and
    # runtime fixtures are repaired.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        api-level: [ 29, 35 ]

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Instrumented Tests
        uses: ReactiveCircus/android-emulator-runner@v2
        continue-on-error: true
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: ./gradlew connectedDebugAndroidTest --stacktrace

      - name: Upload Instrumented Test Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: android-instrumented-test-results-api-${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
          if-no-files-found: ignore
